name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: |
          for file in assets/js/*.js; do
            node --check "$file"
          done

      - name: Run tests
        run: |
          node tests/calculator.test.js
          node tests/diagram-highlight.test.js
          node tests/input-state.test.js
          node tests/message-copy.test.js
          node tests/portmap-columns.test.js
          node tests/render-scheduler.test.js
          node tests/report-layout.test.js
